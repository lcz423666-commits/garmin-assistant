server {
    server_name 43.99.84.162.sslip.io 43.99.84.162 _;

    root /var/www/garmin-assistant/public;

    # API 反代 → FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        client_max_body_size 20m;
    }

    # 聊天页面
    location /chat {
        try_files $uri $uri/ /chat/index.html;
    }

    location /charts/ {
        access_log off;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location / {
        return 302 /chat/;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/43.99.84.162.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/43.99.84.162.sslip.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = 43.99.84.162.sslip.io) {
        return 301 https://$host$request_uri;
    }
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 43.99.84.162.sslip.io 43.99.84.162 _;
    return 404;
}
